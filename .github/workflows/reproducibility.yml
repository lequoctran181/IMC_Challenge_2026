name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build all publication executables
        run: make build-all
      - name: Run synthetic topology, distance, and evaluator tests
        run: make synthetic-validation
      - name: Check article and repository values against the release record
        run: make article-consistency
      - name: Verify score, checksums, and accepted source
        run: make verify-release
