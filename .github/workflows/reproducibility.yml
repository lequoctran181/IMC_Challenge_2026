name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify score, checksums, and accepted source
        run: make verify
