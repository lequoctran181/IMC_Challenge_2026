name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build all publication executables
        run: make build-all
      - name: Run synthetic topology, distance, and evaluator tests
        run: make synthetic-validation
      - name: Check article and repository values against the release record
        run: make article-consistency
      - name: Verify score, checksums, and accepted source
        run: make verify-release

  render-editable-article:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install headless document renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer poppler-utils
      - name: Render editable DOCX and verify the PDF envelope
        run: |
          mkdir -p build/docx-render
          libreoffice --headless --convert-to pdf --outdir build/docx-render \
            paper/IMC_Challenge_Round2_NEU_AddictedTribes.docx
          test -s build/docx-render/IMC_Challenge_Round2_NEU_AddictedTribes.pdf
          pages=$(pdfinfo build/docx-render/IMC_Challenge_Round2_NEU_AddictedTribes.pdf | awk '/^Pages:/ {print $2}')
          test "$pages" -ge 25
          test "$pages" -le 50
      - name: Upload LibreOffice render for manual page-by-page inspection
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: editable-article-libreoffice-render
          path: build/docx-render/IMC_Challenge_Round2_NEU_AddictedTribes.pdf
          if-no-files-found: error
